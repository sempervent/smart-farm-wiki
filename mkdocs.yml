# MkDocs site: published wiki (`wiki/`). Operator handbook (`docs/`) is not part of the site build.
# See docs/operations/publishing.md for CI and local build commands.

site_name: Smart Farm Wiki
site_description: Agent-maintained markdown wiki — synthesis, topics, and source-notes
site_author: Repository maintainers

repo_url: https://github.com/sempervent/smart-farm-wiki
repo_name: sempervent/smart-farm-wiki
edit_uri: edit/main/wiki/

docs_dir: wiki

# Navigation is generated from the `wiki/` tree (MkDocs 1.5+). Start at index.md or overview.md.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

hooks:
  - scripts/mkdocs_neutralize_raw_links.py

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

# Wiki pages cite `raw/` paths that are not in docs_dir; do not fail the build on those.
validation:
  links:
    not_found: ignore

extra_css:
  - stylesheets/raw-source-refs.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sempervent/smart-farm-wiki

copyright: Copyright &copy; 2026 — Smart Farm Wiki
